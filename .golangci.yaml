version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - nolintlint
    - testifylint
    - unconvert
    - unparam
    - usestdlibvars
  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
  sort-order:
    - file
    - linter
